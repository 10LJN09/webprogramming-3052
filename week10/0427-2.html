<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
.wrapper {
    display: flex;
    align-items: flex-start; 
    gap: 20px;
    width: 100%;
    
  }


.no-distortion {
    width: 33%;
    height: 300px;
    border: 1px solid #2f2f2f; 
    object-fit: cover; 
    background-color: #fff;
    border-radius: 18px; 
  }
.circle-frame {
    width: 150px;  
    height: 150px;
    margin: 0 auto;
    border-radius: 50%; 
    
    border: 1px solid #2f2f2f; 
    object-fit: cover;
    box-sizing: border-box; 
  }
.distortion {
    width: 33%;
    height:  300px;
    object-fit: fill; 
  }
</style>
</head>
<body>
<div class="wrapper">
  <img class="no-distortion" src="https://picsum.photos/id/10/600/800" >

  <img class="circle-frame" src="https://picsum.photos/id/1015/400/400" >

  <img class="distortion" src="https://picsum.photos/id/10/600/800" >
</div>
</body>
</html>
