<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
    h1{ 
        text-align:left;
        border-style: 1px solid black;
        text-decoration: overline;
        text-shadow: 2px 2px rgb(255, 146, 146);
    }           
    h2{
        text-align: left;
        border: 1px solid black;
        outline: 2px solid yellow;
        font-style: oblique;
    }   
    h3{
        text-align: right;
        text-decoration: underline;
        
    }       
</style>
</head>
<body>
    <h1 class="one">This is heading 1</h1>
    <h2 class="two">This is heading 2</h2>
    <h3 class="three">This is heading 3</h3>
</body>
</html>
