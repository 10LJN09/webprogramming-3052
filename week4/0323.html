<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
    p.one{
        border-style: double;
        border-width: 5px;
        border-color: red;
        background-color:skyblue;
    }
    p.two{
        border-style: solid;
        border-radius: 5px;
        border-color:cornflowerblue;
        background-color:yellow;
    }
     p.three{
        border-style: dotted;
        border-width: thick;
        border-color: gray;
        background-color: rgb(59, 180, 59);

    }
</style>
</head>
<body>
    
    <p class="one">Hello World</p>
    <p class="two">Hello World</p>
    <p class="three">Hello World</p>
</body>
</html>
