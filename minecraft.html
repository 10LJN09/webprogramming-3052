    <h1>Minecraft 簡介</h1>
    <p>Minecraft 是一款由 Mojang Studios 開發的沙盒建造遊戲，玩家可以在一個由方塊組成的 3D 世界中自由探索、建造、冒險與生存。</p>
    <h2>遊戲特色</h2>
    <ul>
        <li>無限的世界探索與建造</li>
        <li>多種遊戲模式：生存、創造、冒險、旁觀</li>
        <li>支援多人連線與社群模組</li>
        <li>豐富的資源收集與合成系統</li>
    </ul>
